<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperPulse SIM Registration</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>HyperPulse</h1>
        <p class="subtitle">SIM Registration Portal</p>
        
        <form id="hyperPulseForm">
            <div class="input-group">
                <input type="text" id="firstName" placeholder="First Name" required>
                <input type="text" id="lastName" placeholder="Last Name" required>
            </div>

            <input type="text" id="companyName" placeholder="Company Name" required>
            <input type="email" id="companyEmail" placeholder="Company Email" required>
            
            <div class="input-group">
                <select id="country" required>
                    <option value="">Country</option>
                    <option value="US">USA (+1)</option>
                    <option value="GB">UK (+44)</option>
                    <option value="AU">Australia (+61)</option>
                </select>
                <input type="tel" id="contactNumber" placeholder="Mobile Number" required>
            </div>

            <div class="iccid-wrapper">
                <input type="text" id="iccid" placeholder="SIM ICCID" required>
                <button type="button" id="scanBtn">📸 Scan</button>
            </div>
            
            <div id="interactive" class="viewport"></div>

            <input type="text" id="referredBy" placeholder="Referred By (Optional)">

            <button type="submit" id="submitBtn">Register SIM</button>
            <div id="statusMessage"></div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
