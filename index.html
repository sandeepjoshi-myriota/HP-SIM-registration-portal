<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperPulse SIM Registration</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

    <div class="portal-card">
        <header>
            <h1>HyperPulse</h1>
            <p class="tagline">SIM Registration Portal</p>
        </header>

        <form id="hyperPulseForm">
            <div class="row">
                <input type="text" id="firstName" placeholder="First Name" required>
                <input type="text" id="lastName" placeholder="Last Name" required>
            </div>

            <input type="text" id="companyName" placeholder="Company Name" required>
            <input type="email" id="companyEmail" placeholder="Business Email" required>

            <div class="row">
                <select id="country" required>
                    <option value="">Country</option>
                    <option value="1">USA (+1)</option>
                    <option value="44">UK (+44)</option>
                    <option value="61">AUS (+61)</option>
                </select>
                <input type="tel" id="contactNumber" placeholder="Mobile Number" required>
            </div>

            <div class="scanner-section">
                <label>SIM Card ICCID</label>
                
                <div id="scanner-wrapper">
                    <div id="scanner-instructions">Scan the bar code on your SIM card</div>
                    <div id="interactive"></div>
                    <div class="focus-frame">
                        <div class="corner top-left"></div>
                        <div class="corner top-right"></div>
                        <div class="corner bottom-left"></div>
                        <div class="corner bottom-right"></div>
                        <div class="scan-line"></div>
                    </div>
                </div>
                
                <div class="scan-controls">
                    <input type="text" id="iccid" placeholder="Scan or enter ICCID" required>
                    <button type="button" id="scanBtn">📸 Open Scanner</button>
                </div>
            </div>

            <input type="text" id="referredBy" placeholder="Referred By (Optional)">

            <button type="submit" id="submitBtn">Complete Registration</button>
            
            <div id="statusMessage"></div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
